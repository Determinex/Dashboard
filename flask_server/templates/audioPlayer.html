<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MP3 Player</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <style>
    body, html {
      height: 100%;
      margin: 0;
      background-color: #111; /* Dark background */
    }
    .container {
      min-width: 294px;
      min-height: 378px;
      max-height: 100%;
      background-color: #222; /* Dark background */
      padding: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      margin: 20px auto; /* Center the container horizontally */
    }
    .playlist-item {
      display: block;
      padding: 5px;
      margin: 3px;
      border: 1px solid #444; /* Dark border */
      cursor: pointer;
      color: #ddd; /* Light text color for readability */
      background: linear-gradient(
        45deg,
        #e6b800 5%,  /* Light gold */
        #b38f00 10%, /* Lighter gold */
        #806600 30%, /* Medium gold */
        #665500 50%, /* Dark gold */
        #806600 70%, /* Medium gold */
        #b38f00 80%, /* Lighter gold */
        #e6b800 95%  /* Light gold */
      );
      position: relative;
      overflow: hidden;
      transition: background 0.3s;
      text-align: center;
    }
    .playlist-item::before {
      content: '';
      position: absolute;
      top: 0;
      left: -75%;
      width: 50%;
      height: 100%;
      background: linear-gradient(90deg, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.5) 50%, rgba(255, 255, 255, 0) 100%);
      transform: skewX(-25deg);
    }
    .playlist-item:hover::before {
      animation: shine 0.75s;
    }
    @keyframes shine {
      0% {
        left: -75%;
      }
      100% {
        left: 125%;
      }
    }
    .accordion {
      background-color: #222; /* Dark background */
      color: #ddd; /* Light text color */
      cursor: pointer;
      padding: 10px;
      width: 100%;
      border: none;
      text-align: center;
      outline: none;
      font-size: 15px;
      transition: 0.4s;
    }
    .accordion:hover {
      background-color: #333; /* Slightly lighter background on hover */
    }
    .active {
      background-color: #222; /* Keep the background color the same when active */
      color: #ddd; /* Ensure text color remains light */
    }
    .panel {
      padding: 0 10px;
      display: none;
      background-color: #111; /* Dark background */
      border-bottom: #444 1px solid;
      overflow: hidden;
      color: #ddd; /* Light text color */
      margin-bottom: 5px; /* Add spacing between panels and controls */
    }
    .controls {
      text-align: center;
      margin-top: 10px;
      z-index: 1; /* Ensure controls are above panels */
      background-color: #222; /* Match container background */
      padding: 5px;
      border-radius: 10px;
    }
    .controls button {
      margin: 0 5px;
      font-size: 16px; /* Adjusted font size */
      background-color: #444; /* Dark button background */
      color: #ddd; /* Light text color */
      border: none;
      padding: 5px;
      cursor: pointer;
      transition: background-color 0.3s;
      position: relative;
    }
    .controls button:hover {
      background-color: #555; /* Slightly lighter background on hover */
    }
    .controls button .fa-repeat-1 {
      position: absolute;
      top: 0;
      right: 0;
      font-size: 10px; /* Adjusted font size */
      background-color: #444;
      border-radius: 50%;
      padding: 2px;
    }
    #albumArt {
      text-align: center;
      margin-top: 10px;
    }
    #albumArt img {
      max-width: 100%;
      max-height: 150px; /* Adjusted max height */
      width: auto;
      height: auto;
    }
    #playlist {
      overflow-y: auto; /* Make the playlist scrollable */
      max-height: 200px; /* Adjust the max height as needed */
    }
    #playlist::-webkit-scrollbar {
      width: 10px;
    }
    #playlist::-webkit-scrollbar-thumb {
      background-color: #444; /* Dark scrollbar thumb */
      border-radius: 10px;
    }
    #playlist::-webkit-scrollbar-track {
      background-color: #222; /* Dark scrollbar track */
    }

    /* Media Queries for Responsive Design */
    @media (max-width: 600px) {
      .container {
        min-width: 100%;
        min-height: 100%;
        padding: 5px;
        margin: 0;
        border-radius: 0;
      }
      .controls button {
        font-size: 14px; /* Smaller font size for buttons */
        padding: 3px;
      }
      #albumArt img {
        max-height: 100px; /* Smaller album art for mobile */
      }
      #playlist {
        max-height: 150px; /* Smaller max height for playlist */
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <button class="accordion">Audio Player</button>
    <div class="panel">
      <div id="player">
        <div id="albumArt"></div>
        <div class="controls">
          <button id="shuffleButton"><i class="fas fa-random"></i></button>
          <button id="prevTrack"><i class="fas fa-backward"></i></button>
          <button id="playButton"><i class="fas fa-play"></i></button>
          <button id="pauseButton" style="display: none;"><i class="fas fa-pause"></i></button>
          <button id="muteButton"><i class="fas fa-volume-mute"></i></button>
          <button id="volumeButton" style="display: none;"><i class="fas fa-volume-up"></i></button>
          <button id="nextTrack"><i class="fas fa-forward"></i></button>
          <button id="repeatButton" class="inactive"><i class="fas fa-redo"></i></button>
        </div>
      </div>
    </div>

    <button class="accordion">Playlist</button>
    <div class="panel">
      <div id="playlist"></div>
    </div>
  </div>

  <script>
    const MP3Player = {
      audioPlayer: new Audio(),
      playButton: document.getElementById('playButton'),
      pauseButton: document.getElementById('pauseButton'),
      muteButton: document.getElementById('muteButton'),
      volumeButton: document.getElementById('volumeButton'),
      shuffleButton: document.getElementById('shuffleButton'),
      repeatButton: document.getElementById('repeatButton'),
      playlistElement: document.getElementById('playlist'),
      currentTrackIndex: 0,
      playlist: [],
      isShuffling: false,
      repeatMode: 'none', // 'none', 'one', 'all'

      playAudio() {
        try {
          this.audioPlayer.play();
        } catch (error) {
          console.error('Error playing audio:', error);
        }
      },

      pauseAudio() {
        try {
          this.audioPlayer.pause();
        } catch (error) {
          console.error('Error pausing audio:', error);
        }
      },

      setTrack(index) {
        if (index >= 0 && index < this.playlist.length) {
          this.currentTrackIndex = index;
          const { file, albumArt } = this.playlist[index];
          this.changeTrack(file, albumArt);
        }
      },

      changeTrack(audioSrc, albumArtSrc) {
        try {
          this.audioPlayer.src = `/static/media/${audioSrc}`;
          document.getElementById('albumArt').innerHTML = `<img src="/static/media/${albumArtSrc}" alt="Album Art" style="max-width: 100%;">`;
          this.playAudio();
        } catch (error) {
          console.error('Error changing track:', error);
        }
      },

      prevTrack() {
        try {
          if (this.currentTrackIndex > 0) {
            this.setTrack(this.currentTrackIndex - 1);
          }
        } catch (error) {
          console.error('Error going to previous track:', error);
        }
      },

      nextTrack() {
        try {
          if (this.isShuffling) {
            this.setTrack(Math.floor(Math.random() * this.playlist.length));
          } else if (this.currentTrackIndex < this.playlist.length - 1) {
            this.setTrack(this.currentTrackIndex + 1);
          } else if (this.repeatMode === 'all') {
            this.setTrack(0);
          }
        } catch (error) {
          console.error('Error going to next track:', error);
        }
      },

      togglePlayPause() {
        try {
          if (this.audioPlayer.paused) {
            this.playButton.style.display = 'none';
            this.pauseButton.style.display = 'inline-block';
            this.playAudio();
          } else {
            this.playButton.style.display = 'inline-block';
            this.pauseButton.style.display = 'none';
            this.pauseAudio();
          }
        } catch (error) {
          console.error('Error toggling play/pause:', error);
        }
      },

      toggleMute() {
        try {
          this.audioPlayer.muted = !this.audioPlayer.muted;
          this.updateMuteButton();
        } catch (error) {
          console.error('Error toggling mute:', error);
        }
      },

      setVolume(volume) {
        try {
          this.audioPlayer.volume = volume;
          this.updateMuteButton();
        } catch (error) {
          console.error('Error setting volume:', error);
        }
      },

      updateMuteButton() {
        try {
          if (this.audioPlayer.muted) {
            this.muteButton.style.display = 'inline-block';
            this.volumeButton.style.display = 'none';
          } else {
            this.muteButton.style.display = 'none';
            this.volumeButton.style.display = 'inline-block';
          }
        } catch (error) {
          console.error('Error updating mute button:', error);
        }
      },

      toggleShuffle() {
        this.isShuffling = !this.isShuffling;
        this.shuffleButton.classList.toggle('active', this.isShuffling);
        if (this.isShuffling) {
          this.shufflePlaylist();
        } else {
          this.fetchPlaylist(); // Reset to original order if shuffle is turned off
        }
      },

      shufflePlaylist() {
        const currentTrack = this.playlist[this.currentTrackIndex];
        const remainingTracks = this.playlist.filter((_, index) => index !== this.currentTrackIndex);
        for (let i = remainingTracks.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [remainingTracks[i], remainingTracks[j]] = [remainingTracks[j], remainingTracks[i]];
        }
        this.playlist = [currentTrack, ...remainingTracks];
        this.renderPlaylist();
      },

      renderPlaylist() {
        this.playlistElement.innerHTML = '';
        this.playlist.forEach((track, index) => {
          const trackElement = document.createElement('div');
          trackElement.className = 'playlist-item';
          trackElement.textContent = track.title;
          trackElement.dataset.src = track.file;
          trackElement.dataset.albumArt = track.albumArt;
          trackElement.onclick = () => this.setTrack(index);
          this.playlistElement.appendChild(trackElement);
        });
      },

      toggleRepeatMode() {
        if (this.repeatMode === 'none') {
          this.repeatMode = 'one';
          this.repeatButton.innerHTML = '<i class="fas fa-redo"></i><span class="fa-repeat-1">1</span>';
          this.repeatButton.classList.add('active');
        } else if (this.repeatMode === 'one') {
          this.repeatMode = 'all';
          this.repeatButton.innerHTML = '<i class="fas fa-redo"></i>';
          this.repeatButton.classList.add('active');
        } else {
          this.repeatMode = 'none';
          this.repeatButton.innerHTML = '<i class="fas fa-redo"></i>';
          this.repeatButton.classList.remove('active');
        }
      },

      fetchPlaylist() {
        fetch('/static/media/playlist.xml')
          .then(response => response.text())
          .then(data => {
            try {
              const parser = new DOMParser();
              const xmlDoc = parser.parseFromString(data, 'text/xml');
              const tracks = xmlDoc.getElementsByTagName('track');
              this.playlistElement.innerHTML = '';
              this.playlist = [];
              for (let i = 0; i < tracks.length; i++) {
                const title = tracks[i].getElementsByTagName('title')[0].textContent;
                const file = tracks[i].getElementsByTagName('file')[0].textContent;
                const albumArt = tracks[i].getElementsByTagName('albumArt')[0].textContent;
                const track = document.createElement('div');
                track.className = 'playlist-item';
                track.textContent = title;
                track.dataset.src = file;
                track.dataset.albumArt = albumArt;
                track.onclick = () => this.setTrack(i);
                this.playlistElement.appendChild(track);
                this.playlist.push({ title, file, albumArt });
              }
              console.log('Playlist fetched and parsed successfully.');
            } catch (error) {
              console.error('Error parsing playlist XML:', error);
            }
          })
          .catch(error => console.error('Error fetching playlist:', error));
      },

      initialize() {
        try {
          this.fetchPlaylist();
          this.playButton.addEventListener('click', () => {
            if (!this.audioPlayer.src) {
              this.setTrack(0); // Set the first track if no track is set
            }
            this.togglePlayPause();
          });
          this.pauseButton.addEventListener('click', () => this.togglePlayPause());
          this.muteButton.addEventListener('click', () => this.toggleMute());
          this.volumeButton.addEventListener('click', () => this.toggleMute());
          this.shuffleButton.addEventListener('click', () => this.toggleShuffle());
          this.repeatButton.addEventListener('click', () => this.toggleRepeatMode());
          document.getElementById('prevTrack').addEventListener('click', () => this.prevTrack());
          document.getElementById('nextTrack').addEventListener('click', () => this.nextTrack());

          // Sync play/pause button states with audio element controls
          this.audioPlayer.addEventListener('play', () => {
            this.playButton.style.display = 'none';
            this.pauseButton.style.display = 'inline-block';
          });
          this.audioPlayer.addEventListener('pause', () => {
            this.playButton.style.display = 'inline-block';
            this.pauseButton.style.display = 'none';
          });

          // Sync mute/unmute button states with audio element controls
          this.audioPlayer.addEventListener('volumechange', () => {
            this.updateMuteButton();
          });

          // Handle track end event
          this.audioPlayer.addEventListener('ended', () => {
            if (this.repeatMode === 'one') {
              this.playAudio();
            } else {
              this.nextTrack();
            }
          });

          // Initialize mute button state
          this.updateMuteButton();
        } catch (error) {
          console.error('Error initializing MP3 player:', error);
        }
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      MP3Player.initialize();

      // Accordion functionality
      const accordions = document.getElementsByClassName('accordion');
      for (let i = 0; i < accordions.length; i++) {
        accordions[i].addEventListener('click', function() {
          this.classList.toggle('active');
          const panel = this.nextElementSibling;
          if (panel.style.display === 'block') {
            panel.style.display = 'none';
          } else {
            panel.style.display = 'block';
          }
        });
      }
    });
  </script>
</body>
</html>
