<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Directory Tree Explorer</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script> <!-- Include jQuery -->
    <style>
        .directory {
            cursor: pointer;
            font-weight: bold;
        }
        .file {
            margin-left: 20px;
        }
        .child-container {
            margin-left: 20px;
            display: none; /* Initially hidden */
        }
    </style>
</head>
<body>
    <h1>Interactive Directory Tree Explorer</h1>
    <button id="fetchDirectoryButton">Fetch Dashboard Directory</button>
    <div id="directoryTree"></div> <!-- Area to display the directory tree -->

    <script>
        $(document).ready(function() {
            $('#fetchDirectoryButton').click(function() {
                $.ajax({
                    url: 'http://127.0.0.1:3000/api/directory', // Node.js server endpoint
                    method: 'GET',
                    success: function(data) {
                        createTree(data, $('#directoryTree'));
                    },
                    error: function(xhr, status, error) {
                        console.error('Error:', error);
                        $('#directoryTree').text('Error fetching data.');
                    }
                });
            });

            function createTree(data, container) {
                container.empty(); // Clear previous data
                data.forEach(function(item) {
                    const itemDiv = $('<div></div>').text(item.name).addClass(item.type);
                    container.append(itemDiv);

                    if (item.type === 'directory') {
                        const childContainer = $('<div class="child-container"></div>');
                        itemDiv.append(childContainer);
                        itemDiv.on('click', function(event) {
                            event.stopPropagation(); // Prevent event bubbling
                            childContainer.toggle(); // Toggle visibility on click
                            if (childContainer.is(':empty')) {
                                // If empty, fetch children (optional if you want to load on demand)
                                $.ajax({
                                    url: 'http://127.0.0.1:3000/api/directory', // Adjust endpoint for children if needed
                                    method: 'GET',
                                    success: function(childData) {
                                        createTree(childData, childContainer);
                                    },
                                    error: function(xhr, status, error) {
                                        console.error('Error fetching children:', error);
                                    }
                                });
                            }
                        });
                    }
                });
            }
        });
    </script>
</body>
</html>
